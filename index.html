<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steel Catalog</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f8f8f6;--g100:#f0f0ee;--g200:#e0e0dc;--g400:#a0a09c;--g600:#606060;--green:#1a7a4a;--yellow:#d4a017;--red:#c0392b;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--white);color:var(--black);min-height:100vh;display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:20px;padding:14px 32px;border-bottom:1px solid var(--g200);background:var(--white);position:sticky;top:0;z-index:50;}
.brand{font-size:16px;font-weight:800;letter-spacing:3px;text-transform:uppercase;}
.search-bar{display:flex;gap:8px;flex-wrap:wrap;}
.sf{display:flex;flex-direction:column;gap:2px;}
.sf label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--g400);}
.sf select,.sf input{border:1px solid var(--g200);background:var(--white);font-size:12px;padding:5px 8px;outline:none;color:var(--black);font-family:inherit;min-width:100px;}
.sf select:focus,.sf input:focus{border-color:var(--black);}
.btn-search{background:var(--black);color:var(--white);border:none;font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:8px 20px;cursor:pointer;align-self:flex-end;font-family:inherit;font-weight:600;transition:background .2s;}
.btn-search:hover{background:var(--g600);}
.hdr-stat{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--g400);white-space:nowrap;}

/* ── LOADING / EMPTY ── */
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;padding:60px 20px;}
.state-msg .icon{font-size:32px;opacity:.3;}
.state-msg p{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--g400);}
.spinner{width:24px;height:24px;border:2px solid var(--g200);border-top-color:var(--black);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── GRID ── */
.grid-wrap{padding:24px 32px;flex:1;}
.grid-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;border-bottom:1px solid var(--g200);padding-bottom:10px;}
.grid-hdr h2{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--g400);font-weight:600;}
.grid-hdr span{font-size:10px;color:var(--g400);font-family:'Courier New',monospace;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--g200);}

/* ── CARD ── */
.card{background:var(--white);cursor:pointer;transition:background .15s;}
.card:hover{background:#fafaf8;}
.card-img{height:140px;background:var(--g100);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.card-img canvas{display:block;}
.status-dot{position:absolute;top:12px;right:12px;width:9px;height:9px;border-radius:50%;}
.card-body{padding:16px 18px;border-top:1px solid var(--g200);}
.c-sku{font-size:12px;font-weight:700;font-family:'Courier New',monospace;letter-spacing:.5px;margin-bottom:3px;}
.c-sub{font-size:9px;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.c-specs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.cs label{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--g400);display:block;margin-bottom:1px;}
.cs span{font-family:'Courier New',monospace;font-size:12px;font-weight:600;}
.c-divider{height:1px;background:var(--g200);margin:10px 0;}
.c-bottom{display:flex;justify-content:space-between;align-items:flex-end;}
.c-stock .stock-num{font-size:22px;font-weight:700;line-height:1;}
.c-stock .stock-num.green{color:var(--green);}
.c-stock .stock-num.yellow{color:var(--yellow);}
.c-stock .stock-num.red{color:var(--red);}
.c-stock .stock-unit{font-size:9px;color:var(--g400);text-transform:uppercase;margin-top:1px;}
.c-price{text-align:right;}
.c-price .price-main{font-family:'Courier New',monospace;font-size:13px;font-weight:700;}
.c-price .price-sub{font-size:9px;color:var(--g400);margin-top:1px;}
.card-foot{padding:10px 18px;border-top:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center;}
.btn-detail{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--g600);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;}
.btn-detail:hover{color:var(--black);}
.btn-select{background:var(--black);color:var(--white);border:none;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;cursor:pointer;font-family:inherit;font-weight:600;transition:background .2s;}
.btn-select:hover{background:var(--g600);}
.btn-select:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed;}

/* ── MODAL OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,10,10,.55);z-index:100;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;backdrop-filter:blur(3px);}
.overlay.open{display:flex;}

/* ── ORDER MODAL ── */
.modal{background:var(--white);width:100%;max-width:600px;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{background:var(--black);padding:20px 28px;display:flex;justify-content:space-between;align-items:center;}
.modal-hdr h2{font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--white);}
.modal-close{background:none;border:none;color:var(--g400);font-size:20px;cursor:pointer;line-height:1;}
.modal-close:hover{color:var(--white);}
.modal-body{padding:24px 28px;}

/* order form */
.form-section{margin-bottom:20px;}
.form-section-title{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--g400);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.form-section-title::after{content:'';flex:1;height:1px;background:var(--g200);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-grid.full{grid-template-columns:1fr;}
.frow{display:flex;flex-direction:column;gap:3px;}
.frow label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--g600);}
.frow input,.frow textarea,.frow select{border:1px solid var(--g200);background:var(--white);font-size:13px;padding:7px 10px;outline:none;color:var(--black);font-family:inherit;transition:border-color .2s;width:100%;}
.frow input:focus,.frow textarea:focus{border-color:var(--black);}
.frow input[readonly]{background:var(--g100);color:var(--g600);}

/* spec preview in modal */
.spec-preview{background:var(--g100);padding:14px 16px;margin-bottom:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.sp-item label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--g400);display:block;margin-bottom:2px;}
.sp-item span{font-family:'Courier New',monospace;font-size:13px;font-weight:700;}

/* summary box */
.order-summary{background:var(--black);color:var(--white);padding:14px 16px;margin-bottom:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.os-item label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--g400);display:block;margin-bottom:3px;}
.os-item span{font-size:18px;font-weight:700;letter-spacing:.5px;}

.btn-submit{width:100%;background:var(--black);color:var(--white);border:none;font-size:13px;letter-spacing:4px;text-transform:uppercase;padding:15px;cursor:pointer;font-family:inherit;font-weight:700;transition:background .2s;}
.btn-submit:hover{background:var(--g600);}
.btn-submit:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed;}

/* success state */
.success-box{text-align:center;padding:32px 20px;}
.success-box .check{font-size:48px;margin-bottom:12px;}
.success-box h3{font-size:18px;font-weight:700;letter-spacing:2px;margin-bottom:6px;}
.success-box .order-no{font-family:'Courier New',monospace;font-size:13px;color:var(--g600);margin-bottom:20px;}
.btn-done{border:1px solid var(--black);background:none;font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:10px 24px;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-done:hover{background:var(--black);color:var(--white);}

/* config banner */
.config-banner{background:#fef9c3;border-bottom:2px solid #d4a017;padding:10px 32px;font-size:11px;display:flex;align-items:center;gap:10px;}
.config-banner a{color:var(--black);font-weight:700;}
</style>
</head>
<body>

<!-- CONFIG BANNER — แก้ไขก่อนใช้งาน -->
<div class="config-banner" id="configBanner">
  ⚙️ ยังไม่ได้ตั้งค่า — กรุณาแก้ไข <code>SHEET_ID</code> และ <code>SCRIPT_URL</code> ในโค้ด JS ด้านล่าง
  <a href="#" onclick="document.getElementById('configBanner').style.display='none'">ปิด</a>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="brand">Steel<br>Catalog</div>
  <div class="search-bar">
    <div class="sf">
      <label>ประเภทผิว</label>
      <select id="f-surface">
        <option value="">— ทั้งหมด —</option>
        <option>ดำ (Hot Rolled)</option>
        <option>ชุบสังกะสี (Galvanized)</option>
        <option>Cold Rolled</option>
        <option>สเตนเลส</option>
      </select>
    </div>
    <div class="sf">
      <label>เกรด</label>
      <select id="f-grade">
        <option value="">— ทั้งหมด —</option>
        <option>SPHC</option><option>SS400</option><option>SPCC</option><option>SGHC</option>
      </select>
    </div>
    <div class="sf">
      <label>หนา (mm)</label>
      <select id="f-thick">
        <option value="">— ทั้งหมด —</option>
        <option>1.2</option><option>1.5</option><option>2.0</option><option>2.3</option><option>3.2</option>
      </select>
    </div>
    <div class="sf">
      <label>กว้าง (mm)</label>
      <select id="f-width">
        <option value="">— ทั้งหมด —</option>
        <option>900</option><option>1200</option><option>1500</option>
      </select>
    </div>
    <div class="sf">
      <label>ยาว (mm)</label>
      <select id="f-length">
        <option value="">— ทั้งหมด —</option>
        <option>2000</option><option>2400</option><option>3000</option>
      </select>
    </div>
    <button class="btn-search" onclick="applyFilter()">ค้นหา</button>
  </div>
  <div class="hdr-stat" id="hdr-stat">—</div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content" style="flex:1;display:flex;flex-direction:column;">
  <div class="state-msg" id="loading-state">
    <div class="spinner"></div>
    <p>Loading catalog...</p>
  </div>
</div>

<!-- ORDER MODAL -->
<div class="overlay" id="orderOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <h2>เปิด Sales Order</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG — แก้ไข 2 บรรทัดนี้ก่อนใช้งาน
// ══════════════════════════════════════════════════════
var SHEET_ID   = '1cRyakqWceoB18RrQKUoTCkNbqpPJaku1uCcmZB74ScE';
// หา Sheet ID จาก URL: docs.google.com/spreadsheets/d/[THIS_PART]/edit

var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz0L4mq9Be83pe0VMpFkE9zRl5revOPgUyNxocUK7VzpyrdkOyVBSLWBcEPe7x8RgKafg/exec';
// ได้จากการ Deploy > New Deployment > Web App ใน Apps Script
// ══════════════════════════════════════════════════════

var API_BASE = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
               '/gviz/tq?tqx=out:json&sheet=SKU_CATALOG';

var allSkus      = [];
var filteredSkus = [];
var currentSku   = null;

// ── LOAD DATA ──────────────────────────────────────────
function loadCatalog() {
  // Add cache-bust + หลีกเลี่ยง CORS preflight
  var url = API_BASE + '&nocache=' + Date.now();

  fetch(url)
    .then(function(r){
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text){
      // Google gviz returns: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
      // หา JSON ระหว่าง setResponse( ... );
      var start = text.indexOf('(');
      var end   = text.lastIndexOf(')');
      if (start === -1 || end === -1) throw new Error('parse failed: ' + text.substring(0,120));
      var json = JSON.parse(text.substring(start + 1, end));

      if (!json.table) throw new Error('no table in response');

      var cols = json.table.cols.map(function(c){
        return (c.label && c.label.trim()) ? c.label.trim() : c.id;
      });

      allSkus = (json.table.rows || [])
        .filter(function(row){ return row && row.c && row.c[0] && row.c[0] && row.c[0].v; })
        .map(function(row){
          var obj = {};
          cols.forEach(function(col, i){
            var cell = row.c[i];
            obj[col] = (cell && cell.v !== null && cell.v !== undefined) ? cell.v : '';
          });
          return obj;
        });

      if (allSkus.length === 0) {
        showError('โหลดข้อมูลสำเร็จ แต่ไม่พบข้อมูลใน Sheet — ตรวจสอบว่า Sheet ชื่อ SKU_CATALOG และมีข้อมูลแถวที่ 2 ขึ้นไป');
        return;
      }

      filteredSkus = allSkus.slice();
      renderGrid();
    })
    .catch(function(err){
      console.error('loadCatalog error:', err);
      // ลองวิธี JSONP fallback
      loadViaJsonp();
    });
}

// JSONP fallback — สำหรับกรณี CORS block
function loadViaJsonp() {
  var callbackName = 'steelCatalogCb_' + Date.now();
  var script = document.createElement('script');

  window[callbackName] = function(json) {
    delete window[callbackName];
    document.body.removeChild(script);
    try {
      var cols = json.table.cols.map(function(c){
        return (c.label && c.label.trim()) ? c.label.trim() : c.id;
      });
      allSkus = (json.table.rows || [])
        .filter(function(row){ return row && row.c && row.c[0] && row.c[0].v; })
        .map(function(row){
          var obj = {};
          cols.forEach(function(col, i){
            var cell = row.c[i];
            obj[col] = (cell && cell.v !== null && cell.v !== undefined) ? cell.v : '';
          });
          return obj;
        });
      filteredSkus = allSkus.slice();
      renderGrid();
    } catch(e) {
      showError('ไม่สามารถโหลดข้อมูลได้ — ตรวจสอบว่า Sheet เป็น Public (Anyone with link → Viewer)');
    }
  };

  script.onerror = function() {
    delete window[callbackName];
    document.body.removeChild(script);
    showError('โหลดข้อมูลไม่ได้ — Sheet อาจยังไม่เป็น Public หรือ Sheet ชื่อผิด (ต้องชื่อ SKU_CATALOG)');
  };

  script.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
               '/gviz/tq?tqx=out:json&sheet=SKU_CATALOG&tq=select+*&callback=' + callbackName;
  document.body.appendChild(script);
}

// ── FILTER ────────────────────────────────────────────
function applyFilter() {
  var surface = document.getElementById('f-surface').value;
  var grade   = document.getElementById('f-grade').value;
  var thick   = document.getElementById('f-thick').value;
  var width   = document.getElementById('f-width').value;
  var length  = document.getElementById('f-length').value;

  filteredSkus = allSkus.filter(function(s){
    if (surface && s.SURFACE !== surface) return false;
    if (grade   && s.GRADE   !== grade)   return false;
    if (thick   && String(parseFloat(s.THICKNESS_MM)) !== thick) return false;
    if (width   && String(parseInt(s.WIDTH_MM))  !== width)  return false;
    if (length  && String(parseInt(s.LENGTH_MM)) !== length) return false;
    if (s.STATUS && s.STATUS !== 'ACTIVE') return false;
    return true;
  });
  renderGrid();
}

// ── RENDER GRID ────────────────────────────────────────
function renderGrid() {
  var el = document.getElementById('main-content');
  document.getElementById('hdr-stat').textContent = filteredSkus.length + ' รายการ';

  if (filteredSkus.length === 0) {
    el.innerHTML = '<div class="state-msg"><div class="icon">🔍</div><p>ไม่พบ Spec ที่ตรงกัน</p></div>';
    return;
  }

  var html = '<div class="grid-wrap"><div class="grid-hdr"><h2>ผลการค้นหา</h2><span>' +
             filteredSkus.length + ' รายการ</span></div><div class="grid">';

  filteredSkus.forEach(function(s, i){
    var stock = parseInt(s.STOCK_QTY) || 0;
    var stockClass = stock === 0 ? 'red' : stock < 10 ? 'yellow' : 'green';
    var dotColor   = stock === 0 ? 'var(--red)' : stock < 10 ? 'var(--yellow)' : 'var(--green)';
    var stockKg    = parseFloat(s.STOCK_KG) || 0;

    html += '<div class="card" onclick="openOrder(' + i + ')">' +
      '<div class="card-img">' +
        '<canvas id="cv-'+i+'" width="280" height="140"></canvas>' +
        '<div class="status-dot" style="background:' + dotColor + '"></div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="c-sku">' + (s.SKU||'') + '</div>' +
        '<div class="c-sub">' + (s.SURFACE||'') + ' · ' + (s.GRADE||'') + ' · ' + (s.STANDARD||'') + '</div>' +
        '<div class="c-specs">' +
          '<div class="cs"><label>หนา</label><span>' + s.THICKNESS_MM + ' mm</span></div>' +
          '<div class="cs"><label>กว้าง</label><span>' + parseInt(s.WIDTH_MM) + '</span></div>' +
          '<div class="cs"><label>ยาว</label><span>' + parseInt(s.LENGTH_MM) + '</span></div>' +
        '</div>' +
        '<div class="c-divider"></div>' +
        '<div class="c-bottom">' +
          '<div class="c-stock">' +
            '<div class="stock-num ' + stockClass + '">' + stock + '</div>' +
            '<div class="stock-unit">แผ่น · ' + stockKg.toLocaleString() + ' kg</div>' +
          '</div>' +
          '<div class="c-price">' +
            '<div class="price-main">฿ ' + (parseInt(s.PRICE_PER_SHEET_THB)||0).toLocaleString() + ' / แผ่น</div>' +
            '<div class="price-sub">' + (parseFloat(s.PRICE_PER_KG_THB)||0).toFixed(1) + ' ฿/kg</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-foot">' +
        '<button class="btn-detail" onclick="event.stopPropagation()">ดู Spec →</button>' +
        '<button class="btn-select" ' + (stock===0?'disabled':'') + ' onclick="event.stopPropagation();openOrder(' + i + ')">เลือกรายการนี้</button>' +
      '</div>' +
    '</div>';
  });

  html += '</div></div>';
  el.innerHTML = html;

  // Draw mini 3D bundles
  setTimeout(function(){
    filteredSkus.forEach(function(s, i){
      drawMiniBundle('cv-'+i, s);
    });
  }, 50);
}

// ── MINI 3D BUNDLE (Canvas 2D) ─────────────────────────
function drawMiniBundle(id, s) {
  var cv  = document.getElementById(id);
  if (!cv) return;
  var ctx = cv.getContext('2d');
  var W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);

  var N     = Math.min(parseInt(s.BUNDLE_SIZE)||5, 8);
  var thick = Math.max(0.03, parseFloat(s.THICKNESS_MM) * 0.042);
  var bw    = 3.6, bl = 4.2, gap = 0.01;
  var totalH= N*(thick+gap)-gap;

  var rotY = 0.45, rotX = 0.22;
  var cosY=Math.cos(rotY),sinY=Math.sin(rotY);
  var cosX=Math.cos(rotX),sinX=Math.sin(rotX);

  function tp(x,y,z){
    var x2=x*cosY+z*sinY, z2=-x*sinY+z*cosY;
    var y2=y*cosX-z2*sinX, z3=y*sinX+z2*cosX;
    return [x2,y2,z3];
  }
  function pr(p){
    var fov=180, z=p[2]+9;
    return [W/2+p[0]*fov/z, H/2-p[1]*fov/z];
  }
  function shade(nx,ny,nz){
    var d=nx*0.45+ny*0.75+nz*0.35;
    return Math.max(0.28,Math.min(1,d));
  }
  function drawFace(pts,r,g,b,nx,ny,nz){
    var s2=shade(nx,ny,nz);
    var pts2=pts.map(function(p){return pr(tp(p[0],p[1]+Math.sin(0)*0.03,p[2]));});
    // backface cull
    var e1=[pts2[1][0]-pts2[0][0],pts2[1][1]-pts2[0][1]];
    var e2=[pts2[2][0]-pts2[0][0],pts2[2][1]-pts2[0][1]];
    if(e1[0]*e2[1]-e1[1]*e2[0]>0) return;
    ctx.beginPath();
    ctx.moveTo(pts2[0][0],pts2[0][1]);
    for(var i=1;i<pts2.length;i++) ctx.lineTo(pts2[i][0],pts2[i][1]);
    ctx.closePath();
    ctx.fillStyle='rgb('+Math.round(r*s2)+','+Math.round(g*s2)+','+Math.round(b*s2)+')';
    ctx.fill();
    ctx.strokeStyle='rgba(20,20,18,0.3)';ctx.lineWidth=0.5;ctx.stroke();
  }
  function drawBox(cx,cy,cz,bW,bH,bL,tr,tg,tb,sr,sg,sb){
    var hw=bW/2,hh=bH/2,hl=bL/2;
    var c=[[cx-hw,cy-hh,cz-hl],[cx+hw,cy-hh,cz-hl],[cx+hw,cy+hh,cz-hl],[cx-hw,cy+hh,cz-hl],
           [cx-hw,cy-hh,cz+hl],[cx+hw,cy-hh,cz+hl],[cx+hw,cy+hh,cz+hl],[cx-hw,cy+hh,cz+hl]];
    var faces=[
      {f:[c[3],c[2],c[1],c[0]],n:[0,0,-1],r:sr,g:sg,b:sb},
      {f:[c[4],c[5],c[6],c[7]],n:[0,0,1], r:sr,g:sg,b:sb},
      {f:[c[7],c[6],c[2],c[3]],n:[0,1,0], r:tr,g:tg,b:tb},
      {f:[c[0],c[1],c[5],c[4]],n:[0,-1,0],r:tr,g:tg,b:tb},
      {f:[c[0],c[4],c[7],c[3]],n:[-1,0,0],r:sr,g:sg,b:sb},
      {f:[c[1],c[2],c[6],c[5]],n:[1,0,0], r:sr,g:sg,b:sb},
    ];
    faces.forEach(function(fc){drawFace(fc.f,fc.r,fc.g,fc.b,fc.n[0],fc.n[1],fc.n[2]);});
  }

  var yOff=-totalH/2;
  // Steel color based on surface
  var surf = (s.SURFACE||'').toLowerCase();
  var sr,sg,sb,tr,tg,tb;
  if(surf.indexOf('galvanized')>-1||surf.indexOf('สังกะสี')>-1){
    tr=160;tg=168;tb=160; sr=140;sg=148;sb=140;
  } else if(surf.indexOf('cold')>-1||surf.indexOf('spcc')>-1){
    tr=120;tg=120;tb=125; sr=100;sg=100;sb=105;
  } else {
    tr=72;tg=72;tb=70; sr=58;sg=58;sb=56;
  }

  for(var i=0;i<N;i++){
    var cy=yOff+i*(thick+gap)+thick/2;
    drawBox(0,cy,0,bw,thick,bl,tr,tg,tb,sr,sg,sb);
  }
  // Straps
  [-bl*.28,bl*.28].forEach(function(sz){
    var sH=totalH+.04;
    drawBox(0,yOff+totalH+.03,sz,bw+.06,.05,.04,148,148,140,130,130,122);
    drawBox(0,yOff-.03,sz,bw+.06,.05,.04,148,148,140,130,130,122);
    drawBox(-bw/2-.03,yOff+totalH/2,sz,.04,sH+.1,.04,130,130,122,120,120,112);
    drawBox(bw/2+.03,yOff+totalH/2,sz,.04,sH+.1,.04,130,130,122,120,120,112);
  });
  // Label
  drawBox(bw/2+.04,yOff+totalH/2,-bl*.28,.01,.28,.42,235,235,230,225,225,220);
  // Info text
  ctx.fillStyle='#a0a09c';
  ctx.font='600 9px Courier New';
  ctx.fillText(s.SURFACE ? s.SURFACE.split('(')[0].trim() : '', 8, H-8);
}

// ── OPEN ORDER MODAL ───────────────────────────────────
function openOrder(idx) {
  currentSku = filteredSkus[idx];
  var s = currentSku;
  var pricePerSheet = parseInt(s.PRICE_PER_SHEET_THB) || 0;
  var weightPerSheet = parseFloat(s.WEIGHT_PER_SHEET_KG) || 0;

  document.getElementById('modal-body').innerHTML =
    '<div class="form-section">' +
      '<div class="form-section-title">Spec ที่เลือก</div>' +
      '<div class="spec-preview">' +
        '<div class="sp-item"><label>SKU</label><span style="font-size:10px">' + s.SKU + '</span></div>' +
        '<div class="sp-item"><label>หนา</label><span>' + s.THICKNESS_MM + ' mm</span></div>' +
        '<div class="sp-item"><label>กว้าง×ยาว</label><span>' + parseInt(s.WIDTH_MM) + '×' + parseInt(s.LENGTH_MM) + '</span></div>' +
        '<div class="sp-item"><label>สต็อก</label><span style="color:var(--green)">' + (parseInt(s.STOCK_QTY)||0) + ' แผ่น</span></div>' +
      '</div>' +
    '</div>' +

    '<div class="form-section">' +
      '<div class="form-section-title">ข้อมูลลูกค้า</div>' +
      '<div class="form-grid">' +
        '<div class="frow"><label>ชื่อลูกค้า *</label><input type="text" id="o-name" placeholder="บริษัท / ชื่อ"></div>' +
        '<div class="frow"><label>เบอร์โทร</label><input type="text" id="o-phone" placeholder="0xx-xxx-xxxx"></div>' +
      '</div>' +
    '</div>' +

    '<div class="form-section">' +
      '<div class="form-section-title">รายการสั่งซื้อ</div>' +
      '<div class="form-grid">' +
        '<div class="frow"><label>จำนวน (แผ่น) *</label><input type="number" id="o-qty" value="10" min="1" oninput="updateOrderSummary()"></div>' +
        '<div class="frow"><label>ราคา/แผ่น (฿)</label><input type="number" id="o-price" value="' + pricePerSheet + '" oninput="updateOrderSummary()"></div>' +
      '</div>' +
    '</div>' +

    '<div class="order-summary">' +
      '<div class="os-item"><label>น้ำหนักรวม</label><span id="os-weight">—</span></div>' +
      '<div class="os-item"><label>ราคารวม</label><span id="os-price">—</span></div>' +
      '<div class="os-item"><label>จำนวนมัด</label><span id="os-bundle">—</span></div>' +
    '</div>' +

    '<div class="form-section">' +
      '<div class="form-section-title">หมายเหตุ</div>' +
      '<div class="form-grid full">' +
        '<div class="frow"><label>หมายเหตุเพิ่มเติม</label><textarea id="o-note" rows="2" style="resize:none" placeholder="เช่น วันที่ต้องการรับของ, เงื่อนไขพิเศษ..."></textarea></div>' +
      '</div>' +
    '</div>' +

    '<button class="btn-submit" onclick="submitOrder()">ยืนยัน Order →</button>';

  updateOrderSummary();
  document.getElementById('orderOverlay').classList.add('open');
}

function updateOrderSummary() {
  if (!currentSku) return;
  var qty = parseInt(document.getElementById('o-qty').value) || 0;
  var price = parseInt(document.getElementById('o-price').value) || 0;
  var w = parseFloat(currentSku.WEIGHT_PER_SHEET_KG) || 0;
  var bundle = parseInt(currentSku.BUNDLE_SIZE) || 5;
  document.getElementById('os-weight').textContent = (qty*w).toLocaleString()+' kg';
  document.getElementById('os-price').textContent  = '฿ '+(qty*price).toLocaleString();
  document.getElementById('os-bundle').textContent = Math.ceil(qty/bundle)+' มัด';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('orderOverlay')) return;
  document.getElementById('orderOverlay').classList.remove('open');
}

// ── SUBMIT ORDER ───────────────────────────────────────
function submitOrder() {
  var name  = (document.getElementById('o-name').value||'').trim();
  var qty   = parseInt(document.getElementById('o-qty').value)||0;
  var price = parseInt(document.getElementById('o-price').value)||0;

  if (!name) { alert('กรุณากรอกชื่อลูกค้าครับ'); return; }
  if (!qty)  { alert('กรุณากรอกจำนวนแผ่นครับ'); return; }

  var btn = document.querySelector('.btn-submit');
  btn.disabled = true; btn.textContent = 'กำลังส่ง...';

  var s = currentSku;
  var payload = {
    action:        'createOrder',
    customerName:  name,
    customerPhone: (document.getElementById('o-phone').value||'').trim(),
    sku:           s.SKU,
    grade:         s.GRADE,
    surface:       s.SURFACE,
    thickness:     s.THICKNESS_MM,
    width:         s.WIDTH_MM,
    length:        s.LENGTH_MM,
    qty:           qty,
    weightTotal:   qty * (parseFloat(s.WEIGHT_PER_SHEET_KG)||0),
    pricePerSheet: price,
    priceTotal:    qty * price,
    note:          (document.getElementById('o-note').value||'').trim()
  };

  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    if (res.success) {
      document.getElementById('modal-body').innerHTML =
        '<div class="success-box">' +
          '<div class="check">✓</div>' +
          '<h3>Order สำเร็จ!</h3>' +
          '<div class="order-no">' + res.orderNo + '</div>' +
          '<button class="btn-done" onclick="document.getElementById(\'orderOverlay\').classList.remove(\'open\')">ปิด</button>' +
        '</div>';
    } else {
      alert('เกิดข้อผิดพลาด: ' + (res.error||'unknown'));
      btn.disabled = false; btn.textContent = 'ยืนยัน Order →';
    }
  })
  .catch(function(){
    alert('ไม่สามารถส่งข้อมูลได้ — กรุณาตรวจสอบ SCRIPT_URL');
    btn.disabled = false; btn.textContent = 'ยืนยัน Order →';
  });
}

// ── ERROR ──────────────────────────────────────────────
function showError(msg) {
  document.getElementById('main-content').innerHTML =
    '<div class="state-msg"><div class="icon">⚠️</div><p>' + msg + '</p></div>';
}

// ── INIT ───────────────────────────────────────────────
window.addEventListener('load', function(){
  if (SHEET_ID === 'YOUR_GOOGLE_SHEET_ID_HERE') {
    showError('กรุณาแก้ไข SHEET_ID ในโค้ด JS ก่อนใช้งาน');
    return;
  }
  loadCatalog();
});
</script>
